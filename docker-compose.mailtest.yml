services:
  greenmail:
    image: greenmail/standalone:2.1.8
    container_name: postero-greenmail
    ports:
      - "3025:3025"
      - "3143:3143"
      - "8080:8080"
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.smtp
        -Dgreenmail.setup.test.imap
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users=tester:secret@test.local
        -Dgreenmail.users.login=email
        -Dgreenmail.verbose
      JAVA_OPTS: -Djava.net.preferIPv4Stack=true -Xmx256m